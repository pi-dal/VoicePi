name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG_NAME }}
          path: release-src
          fetch-depth: 0

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Prepare release artifacts
        id: prepare
        working-directory: release-src
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./Scripts/prepare_release.sh

      - name: Create or update GitHub Release
        working-directory: release-src
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.prepare.outputs.tag_name }}
          ASSET_PATH: ${{ steps.prepare.outputs.asset_path }}
          RELEASE_NOTES_PATH: docs/changelogs/${{ steps.prepare.outputs.tag_name }}.md
        run: |
          if [ ! -f "$RELEASE_NOTES_PATH" ]; then
            echo "error: missing release changelog at $RELEASE_NOTES_PATH" >&2
            echo "hint: add docs/changelogs/${TAG_NAME}.md before tagging" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --notes-file "$RELEASE_NOTES_PATH"
            gh release upload "$TAG_NAME" "$ASSET_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ASSET_PATH" --title "$TAG_NAME" --notes-file "$RELEASE_NOTES_PATH"
          fi

      - name: Check out default branch for Homebrew cask update
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: repo-main
          fetch-depth: 0

      - name: Update repository Homebrew cask
        working-directory: release-src
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
          SHA256: ${{ steps.prepare.outputs.sha256 }}
          RELEASE_URL: ${{ steps.prepare.outputs.release_url }}
          OUTPUT_PATH: ${{ github.workspace }}/repo-main/Casks/voicepi.rb
        run: ./Scripts/write_homebrew_cask.sh

      - name: Commit Homebrew cask update
        working-directory: repo-main
        run: |
          if git diff --quiet -- Casks/voicepi.rb; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/voicepi.rb
          git commit -m "chore: update Homebrew cask for ${{ steps.prepare.outputs.version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
